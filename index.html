<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statue de l'Amazone — AR</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== ÉCRAN D'ACCUEIL (affiché en premier) ===== */
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #0a0a0a 0%, #1a1200 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      transition: opacity 0.5s ease;
    }

    /* Cercle décoratif autour de l'icône */
    .splash-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #e0c97f;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      animation: pulse 2s infinite;
    }

    .splash-ring span {
      font-size: 3rem;
    }

    /* Animation de pulsation */
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(224, 201, 127, 0.4); }
      70%  { box-shadow: 0 0 0 20px rgba(224, 201, 127, 0); }
      100% { box-shadow: 0 0 0 0 rgba(224, 201, 127, 0); }
    }

    .splash-titre {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e0c97f;
      margin-bottom: 8px;
      text-align: center;
    }

    .splash-sous-titre {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 48px;
    }

    /* Le bouton tap */
    .splash-cta {
      background: transparent;
      border: 1px solid #e0c97f;
      color: #e0c97f;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      animation: pulse 2s infinite;
    }

    .splash-note {
      position: absolute;
      bottom: 32px;
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      padding: 0 32px;
      line-height: 1.6;
    }

    /* Classe pour faire disparaître le splash */
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ===== MODEL VIEWER ===== */
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #0a0a0a;
      --poster-color: #0a0a0a;
    }

    /* Bouton AR caché — on le déclenche via JS */
    #ar-btn {
      display: none;
    }
  </style>
</head>

<body>

  <!-- ÉCRAN D'ACCUEIL : l'utilisateur tape ici pour lancer l'AR -->
  <div id="splash">
    <div class="splash-ring">
      <span>🗿</span>
    </div>
    <p class="splash-titre">Statue de l'Amazone</p>
    <p class="splash-sous-titre">Bénin · Patrimoine Culturel</p>
    <button class="splash-cta">Toucher pour découvrir</button>
    <p class="splash-note">
      Cette expérience va activer votre caméra<br>pour afficher la statue en réalité augmentée.
    </p>
  </div>

  <!-- LE MODÈLE 3D -->
  <model-viewer
    id="statue"
    src="Meshy_AI__lowapple_texture.glb"
    alt="Statue de l'Amazone du Bénin"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="30deg"
    shadow-intensity="1"
    exposure="1.2"
  >
    <button id="ar-btn" slot="ar-button">AR</button>
  </model-viewer>

  <script>
    const splash = document.getElementById('splash');
    const statue = document.getElementById('statue');
    const arBtn  = document.getElementById('ar-btn');

    // Quand l'utilisateur tape sur l'écran d'accueil
    splash.addEventListener('click', () => {

      // 1. On fait disparaître l'écran d'accueil
      splash.classList.add('hidden');

      // 2. Après 500ms (le temps de la transition), on supprime le splash
      //    et on déclenche automatiquement l'AR
      setTimeout(() => {
        splash.remove();

        // On attend que Model Viewer soit prêt, puis on clique sur le bouton AR
        // "activateAR()" est la méthode officielle de Model Viewer
        if (statue.canActivateAR) {
          statue.activateAR();
        } else {
          // Si l'AR n'est pas disponible sur cet appareil,
          // on reste en mode 3D (rotation au doigt)
          console.log('AR non disponible, mode 3D activé');
        }
      }, 500);
    });
  </script>

</body>
</html>
