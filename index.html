<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Statue de l'Amazone — AR</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(160deg, #0a0a0a 0%, #1a1200 100%);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 2px solid #e0c97f;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      animation: pulse 2s infinite;
    }

    .ring span { font-size: 3.5rem; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(224,201,127,0.4); }
      70%  { box-shadow: 0 0 0 20px rgba(224,201,127,0); }
      100% { box-shadow: 0 0 0 0 rgba(224,201,127,0); }
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e0c97f;
      margin-bottom: 8px;
      text-align: center;
    }

    .sous {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 48px;
    }

    .btn-ar {
      background: #e0c97f;
      color: #0a0a0a;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(224,201,127,0.35);
    }

    .note {
      margin-top: 24px;
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      padding: 0 32px;
      line-height: 1.8;
    }

    /* Fallback model-viewer si AR pas dispo */
    model-viewer {
      width: 100vw;
      height: 60vh;
      display: none;
    }

    #fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
  </style>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>
</head>

<body>

  <!-- ÉCRAN PRINCIPAL -->
  <div id="main">
    <div class="ring"><span>🗿</span></div>
    <h1>Statue de l'Amazone</h1>
    <p class="sous">Bénin · Patrimoine Culturel</p>
    <a id="btn-ar" class="btn-ar" href="#">
      🌍 Voir en réalité augmentée
    </a>
    <p class="note">
      Appuyez pour ouvrir l'expérience<br>
      en réalité augmentée
    </p>
  </div>

  <!-- FALLBACK : si l'appareil ne supporte pas l'AR natif -->
  <div id="fallback">
    <model-viewer
      id="viewer"
      src="Meshy_AI__lowapple_texture.glb"
      alt="Statue de l'Amazone"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1.2"
      ar
      ar-modes="webxr scene-viewer quick-look"
    >
      <button class="btn-ar" slot="ar-button">
        🌍 Voir en AR
      </button>
    </model-viewer>
    <p class="note">
      Tourne avec le doigt · Pinch pour zoomer
    </p>
  </div>

  <script>
    // URL publique de ton modèle .glb sur GitHub Pages
    // ⚠️ REMPLACE "TON-USERNAME" par ton vrai nom d'utilisateur GitHub
    const GLB_URL = "https://femy25.github.io/amazone-ar/Meshy_AI__lowapple_texture.glb";

    // Titre affiché dans Scene Viewer Android
    const TITRE  = "Statue de l'Amazone";

    // URL Scene Viewer Android : ouvre l'AR natif directement
    const sceneViewerUrl =
      `intent://arvr.google.com/scene-viewer/1.0` +
      `?file=${encodeURIComponent(GLB_URL)}` +
      `&mode=ar_only` +
      `&title=${encodeURIComponent(TITRE)}` +
      `#Intent;scheme=https;` +
      `package=com.google.ar.core;` +
      `action=android.intent.action.VIEW;` +
      `S.browser_fallback_url=${encodeURIComponent(GLB_URL)};` +
      `end;`;

    // Détecter si on est sur Android
    const isAndroid = /android/i.test(navigator.userAgent);

    // Détecter si on est sur iOS
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

    const btn = document.getElementById('btn-ar');

    if (isAndroid) {
      // Android : on pointe directement vers Scene Viewer
      // Dès le tap → demande de permission → AR natif
      btn.href = sceneViewerUrl;

    } else if (isIOS) {
      // iOS : Quick Look (AR natif Apple)
      // Nécessite un fichier .usdz — on reste sur Model Viewer pour iOS
      showFallback();

    } else {
      // PC ou appareil non compatible : mode 3D avec Model Viewer
      showFallback();
    }

    function showFallback() {
      document.getElementById('main').style.display = 'none';
      const fb = document.getElementById('fallback');
      fb.style.display = 'flex';
      document.getElementById('viewer').style.display = 'block';
    }
  </script>

</body>
</html>
