<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statue de l'Amazone — AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    /* BARRE DU HAUT */
    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px 0;
    }

    .topbar-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: #444;
      text-transform: uppercase;
    }

    .topbar-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.1;
    }

    /* TITRES */
    .titre {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #444;
      margin-top: 28px;
      margin-bottom: 6px;
    }

    .nom {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.5px;
      color: #fff;
      text-align: center;
      line-height: 1.15;
    }

    .nom span {
      font-weight: 500;
    }

    .sous-titre {
      font-size: 10px;
      color: #333;
      margin-top: 6px;
      margin-bottom: 0;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* MODEL VIEWER */
    model-viewer {
      width: 100vw;
      height: 58vh;
      background-color: transparent;
      --poster-color: transparent;
    }

    /* SÉPARATEUR */
    .divider {
      width: calc(100% - 48px);
      height: 0.5px;
      background: #1f1f1f;
      margin-bottom: 24px;
    }

    /* BOUTON AR */
    .ar-button {
      background: #fff;
      color: #0a0a0a;
      border: none;
      padding: 18px 0;
      width: calc(100% - 48px);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .ar-button:active {
      opacity: 0.85;
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: 10px;
      height: 10px;
    }

    .hint {
      font-size: 10px;
      color: #333;
      letter-spacing: 1px;
      margin-top: 14px;
      margin-bottom: 32px;
    }

    /* Message si AR non supporté */
    .no-ar {
      color: #444;
      font-size: 10px;
      letter-spacing: 1px;
      margin-top: 12px;
      text-align: center;
      padding: 0 24px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

  <!-- BARRE DU HAUT -->
  <div class="topbar">
    <span class="topbar-label">Patrimoine · AR</span>
    <div class="topbar-dot"></div>
  </div>

  <!-- TITRES -->
  <p class="titre">Bénin · Patrimoine culturel</p>
  <h1 class="nom">Statue de<br><span>l'Amazone</span></h1>
  <p class="sous-titre">Expérience AR</p>

  <!-- MODEL VIEWER -->
  <model-viewer
    id="statue"
    src="Meshy_AI__lowapple_texture.glb"
    alt="Statue de l'Amazone du Bénin"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="25deg"
    shadow-intensity="1"
    exposure="1.3"
    ar-button-slot="none"
  >
    <!-- Bouton AR personnalisé -->
    <button class="ar-button" slot="ar-button">
      <div class="btn-icon">
        <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="5" cy="5" r="4" stroke="white" stroke-width="1.2"/>
          <circle cx="5" cy="5" r="1.8" fill="white"/>
        </svg>
      </div>
      Voir en réalité augmentée
    </button>

    <!-- Message si AR non supporté -->
    <p class="no-ar" slot="ar-failure">
      Ton appareil ne supporte pas l'AR.<br>
      Tu peux quand même tourner la statue avec le doigt.
    </p>

  </model-viewer>

  <div class="divider"></div>
  <p class="hint">Appuyez sur le bouton pour activer la caméra</p>

</body>
</html>
